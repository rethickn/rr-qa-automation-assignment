[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*

# ----- Reporting -----------------------------------------------------------
# Console: verbose + live log output.
# HTML:    self-contained report at reports/report.html (pytest-html).
# Allure:  raw results at allure-results/ (render with `allure serve`).
# JUnit:   machine-readable summary at reports/junit.xml (CI friendly).
addopts =
    -v
    --html=reports/report.html --self-contained-html
    --alluredir=allure-results
    --junitxml=reports/junit.xml
    --capture=tee-sys
    -p no:cacheprovider

markers =
    smoke: core happy-path tests
    discover: discover filter tests
    categories: category navigation tests
    pagination: pagination tests
    slugs: deep-link / slug access tests
    api: backend API contract tests
    e2e: full end-to-end user journey tests
    known_issue: encodes a known demo defect (expected to fail)

# ----- Live logging to the console ----------------------------------------
log_cli = true
log_cli_level = INFO
log_cli_format = %(levelname)-7s %(name)s | %(message)s
log_cli_date_format = %H:%M:%S

# ----- File logging (captured into the report) ----------------------------
log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s | %(levelname)-7s | %(name)s | %(funcName)s:%(lineno)d | %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
